name: Federated Learning CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "0 */2 * * *"

jobs:
  federated-training:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn tensorflow joblib

      - name: Create models folder
        run: mkdir -p models

      - name: Run federated learning pipeline
        run: python main_federated_pipeline.py